<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Your Risk Score — FireLink</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <header>
      <h1>Your Risk Assessment</h1>
      <p class="tagline">Understanding your wildfire risk</p>
    </header>

    <main>
      <div class="risk-score">
        <div id="scoreGauge" class="score-gauge"></div>
        <div id="scoreTier" class="score-label"></div>
        <p style="color: var(--text-secondary); margin-top: 12px; font-size: 14px;">Out of 100</p>
      </div>

      <div class="risk-factors">
        <h3>Top Risk Factors</h3>
        <div id="factorsList"></div>
      </div>

      <div style="background: white; padding: 20px; border-radius: 8px; box-shadow: var(--shadow); margin-bottom: 30px;">
        <p style="font-size: 14px; color: var(--text-secondary); margin-bottom: 12px;">
          <strong>Community Context:</strong> Homes like yours in this region experience wildfire exposure at rates 2–3× the national average.
        </p>
      </div>

      <button onclick="window.location.href='plan.html'" class="btn-primary">See My Action Plan</button>
      <button onclick="window.location.href='index.html'" class="btn-secondary" style="margin-top: 12px;">Edit Property Info</button>
    </main>

    <footer>
      <p>Your risk score updates when you change property details.</p>
    </footer>
  </div>

  <script src="app.js"></script>
  <script>
    window.addEventListener('load', () => {
      const state = getState();
      const score = calculateRiskScore(state.property);
      const tier = getRiskTier(score);
      const factors = getTopRiskFactors(state.property, score);

      // Risk score gauge
      const gauge = document.getElementById('scoreGauge');
      gauge.style.background = tier.color;
      gauge.textContent = score;

      // Risk tier label
      document.getElementById('scoreTier').textContent = tier.label + ' Risk';
      document.getElementById('scoreTier').style.color = tier.color;

      // Risk factors
      const factorsList = document.getElementById('factorsList');
      factorsList.innerHTML = factors.map(f => `
        <div class="factor">
          <div class="factor-name">${f.name}</div>
          <div class="factor-contribution">Accounts for ~${f.contribution}% of your risk</div>
        </div>
      `).join('');

      // If no factors (all clear), show a positive message
      if (factors.length === 0) {
        factorsList.innerHTML = '<div class="factor" style="border-left-color: var(--success); background: #E8F5E9;"><div class="factor-name">Great job!</div><div class="factor-contribution">Your home is well-prepared for wildfire risk.</div></div>';
      }
    });
  </script>
</body>
</html>
