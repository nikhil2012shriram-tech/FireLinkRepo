<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FireLink — Wildfire Readiness</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <header>
      <h1>FireLink</h1>
      <p class="tagline">Wildfire Readiness Made Simple</p>
    </header>

    <main>
      <form id="propertyForm" class="form-grid">
        <div class="form-group full-width">
          <label for="zip">ZIP Code <span style="color: var(--danger);">*</span></label>
          <input type="text" id="zip" name="zip" placeholder="e.g., 90210" required>
          <p class="field-note">* For the MVP, ZIP codes are concentrated in Southern California.</p>
          <p id="zipError" class="field-error" style="display:none;">Error: ZIP code not supported yet.</p>
        </div>

        <div class="form-group full-width">
          <label for="homeType">Home Type</label>
          <select id="homeType" name="homeType" required>
            <option value="single-family">Single Family</option>
            <option value="townhome">Townhome</option>
            <option value="multi-family">Multi-Family</option>
          </select>
        </div>

        <div class="form-group">
          <label for="roofMaterial">Roof Material</label>
          <select id="roofMaterial" name="roofMaterial" required>
            <option value="metal">Metal</option>
            <option value="tile">Tile</option>
            <option value="asphalt">Asphalt Shingle</option>
            <option value="wood-shake">Wood Shake</option>
            <option value="other">Other</option>
          </select>
        </div>

        <div class="form-group">
          <label for="sidingMaterial">Siding Material</label>
          <select id="sidingMaterial" name="sidingMaterial" required>
            <option value="fiber-cement">Fiber Cement (fire-resistant)</option>
            <option value="stucco">Stucco</option>
            <option value="vinyl">Vinyl</option>
            <option value="wood">Wood</option>
            <option value="other">Other</option>
          </select>
        </div>

        <div class="form-group">
          <label for="vegetation">Surrounding Vegetation</label>
          <select id="vegetation" name="vegetation" required>
            <option value="sparse">Sparse (low trees/shrubs)</option>
            <option value="moderate">Moderate (some trees/shrubs)</option>
            <option value="heavy">Heavy (dense trees/shrubs)</option>
          </select>
        </div>

        <div class="form-group">
          <label for="defensibleSpace">Defensible Space (0–5 ft from home)</label>
          <select id="defensibleSpace" name="defensibleSpace" required>
            <option value="clear">Clear (no dead plants)</option>
            <option value="partial">Partial (some debris)</option>
            <option value="cluttered">Cluttered (much dead material)</option>
          </select>
        </div>

        <div class="form-group">
          <label for="slope">Property Slope</label>
          <select id="slope" name="slope" required>
            <option value="flat">Flat (0-10%)</option>
            <option value="moderate">Moderate (10-30%)</option>
            <option value="steep">Steep (30%+)</option>
          </select>
        </div>

        <div class="form-group">
          <label for="distanceToWildland">Distance to Wildland/Forest</label>
          <select id="distanceToWildland" name="distanceToWildland" required>
            <option value="far">Far (1+ mile)</option>
            <option value="moderate">Moderate (0.25-1 mile)</option>
            <option value="close">Close (less than 0.25 mile)</option>
          </select>
        </div>

        <div class="form-group">
          <label for="ventType">Vent Type</label>
          <select id="ventType" name="ventType" required>
            <option value="ember-resistant">Ember-Resistant (1/8" mesh)</option>
            <option value="standard">Standard Vents</option>
          </select>
        </div>

        <div class="form-group">
          <label for="deckMaterial">Deck Material</label>
          <select id="deckMaterial" name="deckMaterial" required>
            <option value="none">No Deck</option>
            <option value="composite">Composite/Non-combustible</option>
            <option value="wood">Wood</option>
          </select>
        </div>

        <button type="submit" class="btn-primary full-width" style="margin-top: 12px;">Calculate My Risk</button>
      </form>
    </main>

    <footer>
      <p>FireLink v0.1 — Learn your wildfire risk and take action.</p>
    </footer>
  </div>

  <script src="app.js"></script>
  <script>
    document.getElementById('propertyForm').addEventListener('submit', async (e) => {
      e.preventDefault();

      const submitButton = e.target.querySelector('button[type="submit"]');
      const zipInput = document.getElementById('zip');
      const zipError = document.getElementById('zipError');
      const originalButtonText = submitButton.textContent;

      // Hide error message initially
      zipError.style.display = 'none';

      try {
        // Show loading state
        submitButton.disabled = true;
        submitButton.textContent = 'Checking...';

        // Validate ZIP code
        const zipCode = zipInput.value;
        const response = await fetch(`http://localhost:3000/api/risk/exposure?zip=${zipCode}`);
        const data = await response.json();

        // Check if ZIP is supported
        if (!data.supported) {
          zipError.style.display = 'block';
          submitButton.disabled = false;
          submitButton.textContent = originalButtonText;
          return;
        }

        // ZIP is supported, proceed with form submission
        const state = getState();
        state.property = {
          zip: zipInput.value,
          homeType: document.getElementById('homeType').value,
          roofMaterial: document.getElementById('roofMaterial').value,
          sidingMaterial: document.getElementById('sidingMaterial').value,
          vegetation: document.getElementById('vegetation').value,
          defensibleSpace: document.getElementById('defensibleSpace').value,
          slope: document.getElementById('slope').value,
          distanceToWildland: document.getElementById('distanceToWildland').value,
          ventType: document.getElementById('ventType').value,
          deckMaterial: document.getElementById('deckMaterial').value
        };
        setState(state);

        window.location.href = 'dashboard.html';
      } catch (error) {
        console.error('Error validating ZIP code:', error);
        zipError.textContent = 'Error: Could not validate ZIP code. Please try again.';
        zipError.style.display = 'block';
        submitButton.disabled = false;
        submitButton.textContent = originalButtonText;
      }
    });

    // Load saved state into form
    window.addEventListener('load', () => {
      const state = getState();
      if (state.property.zip) {
        document.getElementById('zip').value = state.property.zip;
        document.getElementById('homeType').value = state.property.homeType;
        document.getElementById('roofMaterial').value = state.property.roofMaterial;
        document.getElementById('sidingMaterial').value = state.property.sidingMaterial;
        document.getElementById('vegetation').value = state.property.vegetation;
        document.getElementById('defensibleSpace').value = state.property.defensibleSpace;
        document.getElementById('slope').value = state.property.slope;
        document.getElementById('distanceToWildland').value = state.property.distanceToWildland;
        document.getElementById('ventType').value = state.property.ventType;
        document.getElementById('deckMaterial').value = state.property.deckMaterial;
      }
    });
  </script>
</body>
</html>
